name: Daily MLB HR Statcast Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "37 6 * * *"
      timezone: "America/Toronto"

permissions:
  contents: write

concurrency:
  group: daily-mlb-hr-statcast-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUN_DATE_TZ: America/Toronto
      RAW_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/data

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Statcast feature CSVs
        run: |
          python statcast_refresh.py \
            --date today \
            --timezone America/Toronto \
            --output-dir data \
            --raw-base-url "$RAW_BASE_URL"

      - name: Commit refreshed CSV outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv data/*.json
          git commit -m "Daily MLB HR Statcast feature refresh" || echo "No changes to commit"
          git push
