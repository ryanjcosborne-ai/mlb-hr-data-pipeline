name: Daily MLB HR Statcast Refresh

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC. Run before the Apps Script morning windows
    # and again midday so the sheet can recover automatically if the first run is delayed.
    - cron: "15 10 * * *"
    - cron: "30 12 * * *"
    - cron: "45 15 * * *"

permissions:
  contents: write

concurrency:
  group: daily-mlb-hr-statcast-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      RUN_DATE_TZ: America/Toronto
      RAW_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/data

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh Statcast feature CSVs
        run: |
          python statcast_refresh.py \
            --date today \
            --timezone America/Toronto \
            --output-dir data \
            --raw-base-url "$RAW_BASE_URL"

      - name: Validate same-day outputs
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          today = datetime.now(ZoneInfo('America/Toronto')).date().isoformat()
          summary = json.loads(Path('data/refresh_summary.json').read_text())
          if summary.get('slate_date') != today:
              raise SystemExit(f"refresh_summary stale: {summary.get('slate_date')} != {today}")

          required = {
              'statcast_batter_rolling.csv': 500,
              'statcast_pitcher_rolling.csv': 500,
              'pitch_type_batter_damage.csv': 1000,
              'pitch_type_pitcher_vulnerability.csv': 1000,
          }
          outputs = summary.get('outputs', {})
          for name, min_rows in required.items():
              rows = int(outputs.get(name, 0))
              if rows < min_rows:
                  raise SystemExit(f"{name} rows too low: {rows} < {min_rows}")

          print(f"Validated same-day Statcast outputs for {today}")
          PY

      - name: Commit refreshed CSV outputs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.csv data/*.json
          git commit -m "Daily MLB HR Statcast feature refresh" || echo "No changes to commit"
          git push
