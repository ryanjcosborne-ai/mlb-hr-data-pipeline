name: Daily Statcast CSV Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '35 7 * * *'
      timezone: 'America/Toronto'

permissions:
  contents: write

jobs:
  refresh-statcast-csvs:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Statcast refresh
        run: python statcast_refresh.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/*.csv

          if git diff --cached --quiet; then
            echo "No CSV changes to commit."
          else
            git commit -m "Update Statcast CSV data"
            git push
          fi
